<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chi tiết đặc sản</title>

  <style>
    :root{
      --text:#ffffff;
      --muted: rgba(255,255,255,.85);
      --border: rgba(255,255,255,.18);
      --navbg: rgba(8, 16, 32, .65);
      --btn: #6aa6ff;
      --cardbg: rgba(18,26,43,.80);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background-image:url("../amthuc/anhmain1.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    .overlay{ min-height:100vh; background: rgba(0,0,0,.35); }
    .container{ width: min(980px, 92%); margin: 0 auto; }

    .header{
      position: sticky; top: 0; z-index: 100;
      background: var(--navbg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner{
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 0;
    }
    .logo{ display:flex; align-items:center; text-decoration:none; }
    .logo img{
      height:44px; width:44px;
      object-fit:contain;
      border-radius:50%;
      background:white;
      padding:4px;
    }
    .nav{ display:flex; align-items:center; gap: 16px; }
    .nav a{
      color: var(--muted);
      text-decoration:none;
      font-size: 15px;
      padding: 8px 10px;
      border-radius: 10px;
      transition: .2s;
    }
    .nav a:hover{ background: rgba(255,255,255,.10); color:var(--text); }

    .wrap{ padding: 28px 0 60px; }

    .detail{
      background: var(--cardbg);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(0,0,0,.45);
    }

    .detail-body{ padding: 18px 18px 22px; }

    .detail-title{
      margin: 0 0 8px;
      font-size: 32px;
      text-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .detail-desc{
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .detail-content{
      margin: 0;
      line-height: 1.8;
      color: rgba(255,255,255,.92);
      white-space: pre-line;
    }

    
    .gallery{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 14px 0 14px;
      padding-top: 6px;
      border-top: 1px solid var(--border);  
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }

    .gallery img{
      width:100%;

      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      display:block;
    }

    
    .gallery img.is-last-odd{
      grid-column: 1 / -1;
      width:  100%;
      justify-self: center;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top: 16px;
      color: var(--btn);
      font-weight: 700;
      text-decoration:none;
    }
    .back:hover{ text-decoration: underline; }

    @media (max-width: 700px){
      .detail-title{ font-size: 24px; }
      .gallery{ grid-template-columns: 1fr; }
      .gallery img{ height: 220px; }
      .gallery img.is-last-odd{ grid-column: auto; width: 100%; }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <header class="header">
      <div class="container header-inner">
        <a class="logo" href="../index.html"><img src="../logo.png" alt="Trang chủ"></a>
        <nav class="nav">
          <a href="../index.html">Trang chủ</a>
          <a href="dulich.html#gioithieu">Giới thiệu</a>
          <a href="dulich.html#lienhe">Liên hệ</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="container">
        <div class="detail">
          <div class="detail-body">
            <h1 id="title" class="detail-title">...</h1>
            <p id="desc" class="detail-desc"></p>

            
            <p id="contentTop" class="detail-content"></p>

            
            <div id="gallery" class="gallery"></div>

            
            <p id="contentBottom" class="detail-content"></p>

            <a class="back" href="dulich.html#gioithieu">← Quay về danh sách</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const DATA = {
      "that-phu-mieu": {
        title: "Thất Phủ Miếu",
        contentTop:
`Chùa được xây theo kiểu của người Hoa, theo dạng cung đình có 5 cửa cái. Theo văn hóa Trung Hoa, trên mỗi cửa đều vẽ hình các vị thần giữ cửa uy nghiêm. Các khu chính điện, Đông Sương điện và Tây Sương điện cùng các khu vực chính khác tuy nằm cách xa nhau nhưng đều được kết nối bởi những “hà cầu” bắc qua ao sen.`,
        images: ["thatphumieu.jpg", "thatphumieu1.jpeg"],

      },

      "cau-my-thuan": {
        title: "Du lịch Cầu Mỹ Thuận Vĩnh Long",
        contentTop:
`Cầu Mỹ Thuận là cầu dây văng đầu tiên ở Việt Nam. Nơi đây được xem là địa điểm phượt Vĩnh Long mà các phượt thủ thường dừng chân ở giữa cầu một lúc để chụp ảnh selfie. Từ đỉnh cầu, ta có thể ngắm nhìn toàn cảnh sông nước từ trên cao, các hàng dừa xanh mướt, đặc biệt buổi chiều ngắm hoàng hôn ở đây thì đẹp khỏi bàn cải.`,
        images: ["caumythuan.jpg","caumythuan1.jpg"],
      },

      "cu-lao-an-binh": {
        title: "Cù lao An Bình Vĩnh Long",
        desc: "Dẻo thơm, dùng làm gỏi cuốn hoặc nem rán.",
        contentTop:
`Không chỉ nổi tiếng bởi những vườn trái cây chuẩn miệt vườn miền Tây mà còn nổi danh với nhiều địa điểm du lịch văn hóa tinh thần nổi bật. Ở cù lao An Bình có nhiều địa điểm du lịch nổi tiếng như: Chùa Tiên Châu, Nhà cổ Cai Cường, Nhà sàn ông Mười Đầy, Vườn trái cây 6 Tấn,... tha hồ cho bạn tham quan.`,
        images: ["culaoanbinh.jpg","culaoanbinh1.jpg"],
      },
      "ca-loc-nuong-chui":{
      title:"Cá lóc nướng chui",
      images:["calocnuongchui1.png","calocnuongchui2.png"],
      contentTop:
      'Trong số các trải nghiệm ở Vĩnh Long mà nhiều bạn trẻ đã chia sẻ, tự tay bắt và thưởng thức món cá lóc nướng trui là điều tuyệt vời nhất. Chỉ khi bắt cá lóc sinh sống tự nhiên ở đồng ruộng, kênh rạch thì thịt mới thật sự chắc khỏe. Như vậy, chỉ khi cá lóc được nướng mới thật sự đúng chuẩn hương vị. Khi nướng, các bạn chỉ cần dùng thanh tre xiên qua thân cá lóc theo chiều dọc rồi để lên than nóng để nướng. Tương tự như cá tai tượng, các bạn nên ăn cá lóc nướng trui khi cuộn với rau, bún, nước chấm. Hương vị ngọt, chắc của thịt cá cộng với mùi khét thoang thoảng khí nướng ban đầu chắc chắn sẽ khiến bạn mê mẩn món ăn này. '
    }
    };

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const item = DATA[id];

    if (!item) {
      location.href = "dulich.html#gioithieu";
    } else {
      document.title = item.title + " - Đặc sản Vĩnh Long";
      document.getElementById("title").textContent = item.title;
      document.getElementById("desc").textContent = item.desc;

      document.getElementById("contentTop").textContent = item.contentTop || "";
      document.getElementById("contentBottom").textContent = item.contentBottom || "";

      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      const imgs = item.images || [];
      if (imgs.length === 0) {
        gallery.style.display = "none";
      } else {
        gallery.style.display = "grid";

        imgs.forEach((src, i) => {
          const im = document.createElement("img");
          im.src = src;
          im.alt = `${item.title} (${i + 1})`;

          if (imgs.length % 2 === 1 && i === imgs.length - 1) {
            im.classList.add("is-last-odd");
          }

          gallery.appendChild(im);
        });
      }
    }
  </script>
</body>
</html>
